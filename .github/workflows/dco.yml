name: DCO

on:
  pull_request:

jobs:
  signoff:
    name: Check sign-offs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify every commit has a Signed-off-by line
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base".."$head" --no-merges); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by line (use 'git commit -s')"
              missing=1
            fi
          done
          exit $missing
